<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>实盘记录与对账</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script src="/static/js/data_update_flow.js"></script>
  <style>
    :root {
      --bg: #f5f6fa;
      --card: #fff;
      --text: #2d3436;
      --muted: #636e72;
      --border: #e0e0e0;
      --accent: #0984e3;
      --green: #00b894;
      --red: #d63031;
      --amber: #f39c12;
      --shadow: 0 2px 12px rgba(0,0,0,0.06);
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    .app { max-width: 1400px; margin: 0 auto; padding: 20px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; flex-wrap: wrap; gap: 12px; }
    .header h1 { font-size: 22px; font-weight: 700; }
    .header .subtitle { font-size: 13px; color: var(--muted); margin-top: 3px; }
    .header-links a { font-size: 13px; color: var(--accent); text-decoration: none; margin-left: 12px; }
    .header-links a:hover { text-decoration: underline; }

    .controls-bar { background: var(--card); border-radius: var(--radius); padding: 13px 18px; margin-bottom: 16px; box-shadow: var(--shadow); display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .ctrl-label { font-size: 13px; color: var(--muted); font-weight: 600; }
    .ctrl-select, .ctrl-input { padding: 6px 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; background: var(--bg); color: var(--text); min-width: 90px; }
    .btn { padding: 7px 16px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #0773c5; }
    .btn-secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: #e8e8e8; }
    .btn-danger { background: #fff; color: var(--red); border: 1px solid var(--red); padding: 3px 9px; font-size: 12px; }
    .btn-danger:hover { background: var(--red); color: #fff; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    @media (max-width: 980px) { .grid-2 { grid-template-columns: 1fr; } }

    .card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 18px 20px; margin-bottom: 16px; }
    .card h2 { font-size: 16px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
    .badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 999px; vertical-align: middle; }
    .badge-prod { background: #d1f2eb; color: var(--green); }
    .badge-research { background: #fdebd0; color: var(--amber); }

    .signal-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
    .signal-cell { background: var(--bg); border-radius: 8px; padding: 10px 12px; }
    .signal-cell .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; font-weight: 600; }
    .signal-cell .val { font-size: 18px; font-weight: 700; color: var(--text); margin-top: 2px; }
    .signal-cell .val.green { color: var(--green); }
    .signal-cell .val.red { color: var(--red); }
    .signal-reason { background: var(--bg); border-radius: 8px; padding: 10px 12px; margin-top: 10px; font-size: 13px; color: var(--text); }
    .signal-meta { font-size: 12px; color: var(--muted); margin-top: 8px; font-style: italic; }
    .panel { border-radius: 8px; padding: 10px 12px; margin-top: 10px; font-size: 13px; line-height: 1.55; }
    .panel-title { font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
    .panel-rationale { background: #f0f7ff; border-left: 3px solid var(--accent); color: var(--text); }
    .panel-rationale .panel-title { color: var(--accent); }
    .panel-risk { background: #fff5f5; border-left: 3px solid var(--red); color: #5d2424; }
    .panel-risk .panel-title { color: var(--red); }
    .panel-opp { background: #f0fbf5; border-left: 3px solid var(--green); color: #1f4d3a; }
    .panel-opp .panel-title { color: var(--green); }
    .panel-meta { background: #f5f5fc; border-left: 3px solid #6c5ce7; color: #3a3a5c; }
    .panel-meta .panel-title { color: #6c5ce7; }
    .panel ul { margin: 0; padding-left: 18px; }
    .panel ul li { margin: 3px 0; }
    .meta-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 4px; }
    .meta-table td { padding: 4px 8px; border-bottom: 1px solid #e6e3f3; vertical-align: top; }
    .meta-table td.meta-lbl { color: var(--muted); width: 28%; }
    .meta-table td.meta-val { color: var(--text); font-variant-numeric: tabular-nums; }
    .meta-table tr:last-child td { border-bottom: none; }
    .meta-table tr.meta-holdout td { background: #ece9ff; font-weight: 700; }
    .research-warning { background: #fff3f3; border: 1px solid var(--red); border-radius: 8px; padding: 10px 14px; margin-bottom: 12px; color: #8b1f1f; font-size: 13px; line-height: 1.5; }
    .research-warning strong { color: var(--red); }
    .research-warning .rule-explain { display: inline-block; margin: 4px 0; font-size: 12px; color: #6c4040; line-height: 1.55; }
    .research-warning .rule-explain strong { color: #6c4040; }
    .badge[title] { cursor: help; }
    .num-pos { color: var(--green); font-weight: 700; }
    .num-neg { color: var(--red); font-weight: 700; }
    .num-muted { color: var(--muted); }
    .num-big { font-size: 14px; }

    .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .form-row { display: flex; flex-direction: column; gap: 4px; }
    .form-row label { font-size: 12px; color: var(--muted); font-weight: 600; }
    .form-row input { padding: 7px 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; background: var(--bg); color: var(--text); }
    .form-actions { display: flex; gap: 10px; margin-top: 12px; }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--border); }
    th { background: var(--bg); color: var(--muted); font-weight: 600; font-size: 12px; text-transform: uppercase; }
    tr:hover td { background: #fafbfc; }
    td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .empty { text-align: center; color: var(--muted); padding: 24px; font-size: 13px; }

    #reconcile-chart { width: 100%; height: 380px; }
    .recon-summary { display: flex; gap: 18px; margin-bottom: 12px; flex-wrap: wrap; }
    .recon-pill { background: var(--bg); border-radius: 999px; padding: 6px 14px; font-size: 13px; font-weight: 600; }
    .recon-pill .v { color: var(--accent); margin-left: 6px; }

    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #2d3436; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 13px; opacity: 0; transition: opacity 0.2s; z-index: 999; }
    .toast.show { opacity: 1; }
    .toast.success { background: var(--green); }
    .toast.error { background: var(--red); }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <h1>实盘记录与对账</h1>
      <div class="subtitle">把策略信号转化为可执行的入场指令；记录实际下单；对比策略 NAV 与实盘 NAV 的偏差</div>
    </div>
    <div class="header-links">
      <a href="/">选股</a>
      <a href="/timing">A股择时</a>
      <a href="/us_timing">美股择时</a>
      <a href="/hk_timing">港股择时</a>
      <a href="/commodity">大宗商品</a>
    </div>
  </div>

  <!-- Signal Dashboard -->
  <div id="signal-dashboard" class="card" style="margin-bottom:14px;padding:14px 18px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <h2 style="font-size:15px;font-weight:700;margin:0;">择时信号一览</h2>
      <span style="font-size:11px;color:var(--muted);">点击策略卡片查看详情</span>
    </div>
    <div id="signal-dash-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:8px;">
      <div class="empty" style="grid-column:1/-1;">加载中…</div>
    </div>
  </div>

  <div class="controls-bar">
    <span class="ctrl-label">策略</span>
    <select id="strategy-select" class="ctrl-select" onchange="onStrategyChange()"></select>
    <button class="btn btn-secondary" onclick="refreshAll()">刷新</button>
    <div class="controls-sep" style="width:1px;height:22px;background:var(--border);margin:0 4px;"></div>
    <button class="btn btn-primary" onclick="updateIndexData()" id="btn-update-index">↻ 同步最新数据</button>
    <span id="index-update-msg" style="font-size:12px;color:var(--muted);"></span>
  </div>

  <div class="grid-2">
    <!-- 最新信号卡 -->
    <div class="card">
      <h2>最新入市信号 <span id="status-badge" class="badge"></span></h2>
      <div id="signal-content"><div class="empty">加载中…</div></div>
    </div>

    <!-- 实盘录入表 -->
    <div class="card">
      <h2>录入实盘下单 <span id="capital-hint" class="badge" style="background:#eaf4fc;color:var(--accent);">初始资金 ¥50,000</span></h2>
      <div id="research-warning" class="research-warning" style="display:none;"></div>
      <form id="live-form" onsubmit="submitRecord(event)">
        <div class="form-grid">
          <div class="form-row"><label>日期</label><input type="date" id="f-date" required></div>
          <div class="form-row"><label>ETF 成交价 <span id="lbl-currency" style="color:var(--muted);">(¥)</span></label><input type="number" id="f-price" step="0.001" required oninput="recalcPreview()"></div>
          <div class="form-row"><label>持有数量（股）<span id="lbl-lot" style="color:var(--muted);">每手 100 股</span></label><input type="number" id="f-shares" step="1" required oninput="recalcPreview()"></div>
          <div class="form-row"><label>初始资金（可覆盖默认）</label><input type="number" id="f-capital" step="100" value="50000" oninput="recalcPreview()"></div>
          <div class="form-row" style="grid-column: 1 / -1;"><label>备注（可选）</label><input type="text" id="f-notes" placeholder="如：开盘买入科创50ETF 29000股"></div>
        </div>
        <input type="hidden" id="f-signal-target">
        <div id="preview-line" class="signal-meta" style="margin-top:10px;">
          预览：持仓市值 = — × — = —；实盘仓位 = —
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" onclick="fillFromSignal()">按信号自动填充</button>
          <button type="submit" class="btn btn-primary">提交记录</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 历史记录表 -->
  <div class="card">
    <h2>历史录入记录</h2>
    <div id="records-content" class="table-wrap"><div class="empty">加载中…</div></div>
  </div>

  <!-- 对账图 -->
  <div class="card">
    <h2>策略 NAV vs 实盘 NAV 对账</h2>
    <div id="recon-summary" class="recon-summary"></div>
    <div id="reconcile-chart"></div>
    <div id="recon-msg" class="empty" style="display:none;"></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const ALL_STRATEGIES = [
  { id: 'csi1000_timing', label: '中证1000', region: 'cn' },
  { id: 'star50_timing', label: '科创50', region: 'cn' },
  { id: 'chinext_timing', label: '创业板', region: 'cn' },
  { id: 'hsi_timing', label: '恒生指数', region: 'hk' },
  { id: 'hstech_timing', label: '恒生科技', region: 'hk' },
  { id: 'macro_v32_timing', label: '纳指宏观', region: 'us' },
  { id: 'sp500_timing', label: '标普500', region: 'us' },
  { id: 'gold_timing', label: '黄金', region: 'commodity' },
];
let currentStrategy = 'star50_timing';
let currentSignal = null;
let currentMeta = { initial_capital: 50000, currency: 'CNY', lot_size: 100 };
let reconChart = null;

function currencySymbol() { return currentMeta.currency === 'USD' ? '$' : '¥'; }
function fmtMoney(v) { return currencySymbol() + Number(v).toLocaleString('en-US', { maximumFractionDigits: 2 }); }
function applyMetaToUI() {
  $('capital-hint').textContent = '初始资金 ' + fmtMoney(currentMeta.initial_capital);
  $('lbl-currency').textContent = '(' + currencySymbol() + ')';
  $('lbl-lot').textContent = currentMeta.lot_size > 1 ? `每手 ${currentMeta.lot_size} 股` : '可单股';
  const cap = $('f-capital');
  if (!cap.dataset.userTouched) cap.value = currentMeta.initial_capital;
  recalcPreview();
}

function $(id) { return document.getElementById(id); }
function fmt(v, suffix='') {
  if (v === null || v === undefined || Number.isNaN(v)) return '—';
  if (typeof v === 'number') return v.toFixed(suffix === '%' ? 2 : 4) + suffix;
  return String(v) + suffix;
}
function toast(msg, type='success') {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => { t.className = 'toast'; }, 2200);
}

function initStrategySelect() {
  const sel = $('strategy-select');
  const flags = { cn: '🇨🇳', us: '🇺🇸', hk: '🇭🇰', commodity: '🏅' };
  for (const s of ALL_STRATEGIES) {
    const opt = document.createElement('option');
    opt.value = s.id;
    opt.textContent = (flags[s.region] || '') + ' ' + s.label;
    sel.appendChild(opt);
  }
  sel.value = currentStrategy;
}

function onStrategyChange() {
  currentStrategy = $('strategy-select').value;
  delete $('f-capital').dataset.userTouched;
  refreshAll();
}

function signalUrl(sid) {
  const s = ALL_STRATEGIES.find(x => x.id === sid) || {};
  if (s.region === 'us') return `/api/us_timing/latest_signal?strategy=${sid}`;
  if (s.region === 'hk') return `/api/hk_timing/latest_signal?strategy=${sid}`;
  if (s.region === 'commodity') return `/api/commodity/latest_signal?strategy=${sid}`;
  return `/api/timing/latest_signal?strategy=${sid}`;
}

async function loadSignal() {
  const url = signalUrl(currentStrategy);
  const res = await fetch(url);
  const data = await res.json();
  currentSignal = data;
  renderSignal(data);
}

// 收益类数值上色：正→绿，负→红；可选 emphasize=true 加大字号
function colorPct(v, opts={}) {
  if (v === null || v === undefined || Number.isNaN(v)) return '<span class="num-muted">—</span>';
  const txt = (v >= 0 ? '+' : '') + (v * 100).toFixed(2) + '%';
  const cls = v >= 0 ? 'num-pos' : 'num-neg';
  const big = opts.emphasize ? ' num-big' : '';
  return `<span class="${cls}${big}">${txt}</span>`;
}
// 回撤数值固定红色（绝对值越大风险越高）；空值灰色
function colorDd(v, opts={}) {
  if (v === null || v === undefined || Number.isNaN(v)) return '<span class="num-muted">—</span>';
  const txt = (v * 100).toFixed(2) + '%';
  const big = opts.emphasize ? ' num-big' : '';
  return `<span class="num-neg${big}">${txt}</span>`;
}

function renderMetaPanel(meta) {
  if (!meta) return '';
  const t6 = meta.training_recent_6m || {};
  const tF = meta.training_full_pre_cutoff || {};
  const h = meta.holdout_metrics || {};
  // total_return 在新版 walk_forward 才会落盘；老 JSON 只有 final_nav，需要兜底推导
  const retOf = (m) => (m && m.total_return != null) ? m.total_return
    : (m && m.final_nav != null) ? (m.final_nav - 1.0) : null;
  const t6Ret = retOf(t6), t6Dd = t6.max_drawdown;
  const tFRet = retOf(tF), tFDd = tF.max_drawdown;
  const hRet = h.final_nav != null ? (h.final_nav - 1.0) : null;
  const hDd = h.max_drawdown;
  const hAnn = h.annual_return;
  const period = (meta.holdout_start && meta.holdout_end)
    ? `${meta.holdout_start} ~ ${meta.holdout_end} (${meta.holdout_bars || 0} bars)`
    : '—';
  return `
    <div class="panel panel-meta">
      <div class="panel-title">📊 策略验证概览（拟合数据周期 + OOS 实测）</div>
      <table class="meta-table">
        <tr>
          <td class="meta-lbl">训练 cutoff</td><td class="meta-val">${meta.training_cutoff || '—'}</td>
          <td class="meta-lbl">Holdout 区间</td><td class="meta-val">${period}</td>
        </tr>
        <tr>
          <td class="meta-lbl">训练区 recent_6m</td>
          <td class="meta-val">累计 ${colorPct(t6Ret)}，maxDD ${colorDd(t6Dd)}</td>
          <td class="meta-lbl">训练区 全历史</td>
          <td class="meta-val">累计 ${colorPct(tFRet)}，maxDD ${colorDd(tFDd)}</td>
        </tr>
        <tr class="meta-holdout">
          <td class="meta-lbl">Holdout（OOS 真实表现）</td>
          <td class="meta-val">累计 ${colorPct(hRet, {emphasize:true})}，maxDD ${colorDd(hDd, {emphasize:true})}</td>
          <td class="meta-lbl">Holdout 年化</td>
          <td class="meta-val">${colorPct(hAnn, {emphasize:true})}</td>
        </tr>
      </table>
    </div>
  `;
}

function renderResearchWarning(s) {
  const box = $('research-warning');
  if (!s || s.status === 'production') {
    box.style.display = 'none';
    box.innerHTML = '';
    return;
  }
  const h = (s.experiment_meta && s.experiment_meta.holdout_metrics) || null;
  const annHtml = h && h.annual_return != null
    ? colorPct(h.annual_return, {emphasize:true})
    : '<span class="num-muted">未知</span>';
  const ddHtml = h && h.max_drawdown != null
    ? colorDd(h.max_drawdown, {emphasize:true})
    : '<span class="num-muted">未知</span>';
  box.style.display = 'block';
  box.innerHTML =
    `<strong>⚠ 当前策略状态：研究中（未通过「择时最低门槛」）</strong><br/>` +
    `<span class="rule-explain">门槛要求：在<strong>近 1 个月 / 近 1 季度 / 近半年</strong>三个默认验证窗口里，` +
    `策略的<strong>累计收益</strong>与<strong>最大回撤</strong>都不能输给被择时的 ETF 本身；` +
    `任意一项不达标即视为研究中（项目内部代号 Rule 14）。</span><br/>` +
    `最近 holdout（OOS）表现：年化 ${annHtml}，maxDD ${ddHtml}。` +
    `建议先用小资金试运行，待验证窗口达标后再放大头寸；提交录入时会再次确认。`;
}

function renderSignal(s) {
  const badge = $('status-badge');
  const ruleTip = '择时最低门槛：在近 1 个月 / 近 1 季度 / 近半年三个验证窗口里，'
    + '策略的累计收益与最大回撤都必须不输给被择时的 ETF 本身；任意一项不达标即视为研究中。'
    + '（项目内部代号：Rule 14）';
  if (s.status === 'production') {
    badge.className = 'badge badge-prod';
    badge.textContent = '✓ 已通过择时门槛';
    badge.title = ruleTip;
  } else {
    badge.className = 'badge badge-research';
    badge.textContent = '⚠ 研究中（未通过门槛）';
    badge.title = ruleTip;
  }
  renderResearchWarning(s);
  if (s.error) {
    $('signal-content').innerHTML = `<div class="empty">${s.error}</div>`;
    return;
  }
  // 用 live_* 字段（基于实盘当前持仓 vs 目标），不要用 prev_exposure（那是策略昨日仓位）
  const liveDelta = (s.live_exposure_delta !== undefined) ? s.live_exposure_delta : s.exposure_delta;
  const liveLabel = s.live_rebalance_label || s.rebalance_label;
  const livePos = (s.live_position !== undefined) ? s.live_position : 0;
  const deltaColor = liveDelta > 0.001 ? 'green' : liveDelta < -0.001 ? 'red' : '';
  const deltaTxt = (liveDelta > 0 ? '+' : '') + (liveDelta * 100).toFixed(2) + '%';
  // 看多强度分的颜色与标签
  const bs = (s.bullish_score !== undefined && s.bullish_score !== null) ? s.bullish_score : null;
  const bsColor = bs === null ? '' : bs >= 70 ? '#00b894' : bs >= 50 ? '#fdcb6e' : bs >= 30 ? '#e17055' : '#d63031';
  const bsLabel = bs === null ? '—' : bs >= 80 ? '强烈看多' : bs >= 65 ? '偏多' : bs >= 50 ? '中性偏多' : bs >= 35 ? '中性偏空' : bs >= 20 ? '偏空' : '强烈看空';
  const bsBar = bs === null ? '' : `<div style="margin-top:4px;height:6px;border-radius:3px;background:#2d3748;overflow:hidden;">
    <div style="height:100%;width:${bs}%;background:${bsColor};transition:width 0.4s;border-radius:3px;"></div></div>`;
  const html = `
    <div class="signal-grid">
      <div class="signal-cell"><div class="lbl">信号日 (T)</div><div class="val">${s.as_of_date}</div></div>
      <div class="signal-cell"><div class="lbl">实盘当前仓位</div><div class="val">${(livePos * 100).toFixed(1)}%</div></div>
      <div class="signal-cell"><div class="lbl">T+1 目标仓位</div><div class="val">${(s.target_exposure * 100).toFixed(1)}%</div></div>
      <div class="signal-cell"><div class="lbl">操作建议</div><div class="val ${deltaColor}">${liveLabel}</div></div>
      <div class="signal-cell" style="grid-column:span 2">
        <div class="lbl">看多强度分 <span style="font-weight:400;opacity:0.6;font-size:11px;">（0=极空 · 50=中性 · 100=极多）</span></div>
        <div style="display:flex;align-items:center;gap:10px;margin-top:2px;">
          <div class="val" style="color:${bsColor};font-size:22px;font-weight:700;min-width:36px;">${bs !== null ? bs : '—'}</div>
          <div style="flex:1;">
            ${bsBar}
            <div style="font-size:12px;color:${bsColor};margin-top:3px;">${bsLabel}</div>
          </div>
        </div>
      </div>
      <div class="signal-cell"><div class="lbl">仓位差（目标-实盘）</div><div class="val ${deltaColor}">${deltaTxt}</div></div>
      <div class="signal-cell"><div class="lbl">ETF 收盘参考</div><div class="val">${fmt(s.ref_close)}</div></div>
      <div class="signal-cell"><div class="lbl">ETF 开盘参考</div><div class="val">${fmt(s.ref_open)}</div></div>
    </div>
    <div class="signal-reason"><strong>策略原因：</strong>${s.reason_summary || '—'}</div>
    ${s.action_rationale ? `<div class="panel panel-rationale"><div class="panel-title">▶ 行动详解（${liveLabel}）</div>${s.action_rationale}</div>` : ''}
    ${(s.risks && s.risks.length) ? `<div class="panel panel-risk"><div class="panel-title">⚠ 看多潜在风险（${s.risks.length} 条）</div><ul>${s.risks.map(x => `<li>${x}</li>`).join('')}</ul>${s.risk_signals_as_of ? `<div style="margin-top:8px;font-size:12px;color:#8b5e5e;">风险面板数据日期：${s.risk_signals_as_of}${s.risk_signals_generated_at ? ` · 生成于 ${s.risk_signals_generated_at}` : ''}</div>` : ''}</div>` : ''}
    ${(s.opportunities && s.opportunities.length) ? `<div class="panel panel-opp"><div class="panel-title">↗ 看空时的其他机会（${s.opportunities.length} 条）</div><ul>${s.opportunities.map(x => `<li>${x}</li>`).join('')}</ul>${s.risk_signals_as_of ? `<div style="margin-top:8px;font-size:12px;color:#3a6b55;">机会面板数据日期：${s.risk_signals_as_of}${s.risk_signals_generated_at ? ` · 生成于 ${s.risk_signals_generated_at}` : ''}</div>` : ''}</div>` : ''}
    ${renderMetaPanel(s.experiment_meta)}
    <div class="signal-meta">${s.etf_name || ''} (${s.etf_code || '—'})｜${s.exec_basis}</div>
  `;
  $('signal-content').innerHTML = html;
  $('f-signal-target').value = s.target_exposure;
  renderDashboard();
}

function recalcPreview() {
  const price = parseFloat($('f-price').value);
  const shares = parseFloat($('f-shares').value);
  const capital = parseFloat($('f-capital').value) || currentMeta.initial_capital;
  if (!(price > 0) || !(shares >= 0) || !(capital > 0)) {
    $('preview-line').innerHTML = '预览：持仓市值 = — × — = —；实盘仓位 = —';
    return;
  }
  const holding = price * shares;
  const pos = holding / capital;
  const posPct = (pos * 100).toFixed(2) + '%';
  const cap = capital;
  const over = pos > 1.0 ? ` <span style="color:var(--red);">⚠ 超过 100%，将按 100% 入账</span>` : '';
  $('preview-line').innerHTML =
    `预览：持仓市值 = ${fmtMoney(price)} × ${shares} = <strong>${fmtMoney(holding)}</strong>；` +
    `资金 ${fmtMoney(cap)}；实盘仓位 = <strong>${posPct}</strong>${over}`;
}

function fillFromSignal() {
  if (!currentSignal || currentSignal.error) {
    toast('信号未加载', 'error');
    return;
  }
  // 日期默认填今天
  const today = new Date();
  $('f-date').value = today.toISOString().slice(0, 10);
  const price = currentSignal.ref_open || currentSignal.ref_close;
  if (price) $('f-price').value = price;
  // 按信号目标仓位 × 资金 / 价格 算建议股数，按 lot 取整（不取整到 0）
  const capitalEl = $('f-capital');
  const capital = parseFloat(capitalEl.value) || currentMeta.initial_capital;
  const target = currentSignal.target_exposure || 0;
  const lot = currentMeta.lot_size || 1;
  let shares = 0;
  if (price > 0 && target > 0) {
    shares = Math.floor((capital * target) / price / lot) * lot;
  }
  $('f-shares').value = shares;
  const label = currentSignal.live_rebalance_label || currentSignal.rebalance_label;
  $('f-notes').value = `按 ${currentSignal.as_of_date} 信号录入：${label}（目标 ${(target*100).toFixed(1)}%）`;
  recalcPreview();
  toast('已按最新信号填充', 'success');
}

async function submitRecord(e) {
  e.preventDefault();
  if (currentSignal && currentSignal.status === 'research') {
    const hold = currentSignal.experiment_meta && currentSignal.experiment_meta.holdout_metrics;
    const ann = hold && hold.annual_return != null
      ? ((hold.annual_return >= 0 ? '+' : '') + (hold.annual_return * 100).toFixed(2) + '%')
      : '未知';
    const dd = hold && hold.max_drawdown != null
      ? ((hold.max_drawdown * 100).toFixed(2) + '%')
      : '未知';
    const name = currentSignal.name || currentStrategy;
    const ruleLine =
      `当前策略「${name}」尚未通过「择时最低门槛」，仍处于研究中。\n\n` +
      `门槛要求：在近 1 个月 / 近 1 季度 / 近半年三个验证窗口里，\n` +
      `累计收益与最大回撤都必须不输给被择时的 ETF 本身（项目内部代号 Rule 14）。\n\n` +
      `该策略 Holdout（OOS）表现：年化 ${ann}，maxDD ${dd}。\n\n` +
      `确认要按此策略录入实盘下单吗？`;
    if (!confirm(ruleLine)) return;
  }
  const body = {
    date: $('f-date').value,
    strategy: currentStrategy,
    signal_target: parseFloat($('f-signal-target').value) || null,
    exec_price: parseFloat($('f-price').value),
    shares: parseFloat($('f-shares').value),
    capital: parseFloat($('f-capital').value) || currentMeta.initial_capital,
    notes: $('f-notes').value,
  };
  const res = await fetch('/api/live/record', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const data = await res.json();
  if (res.ok) {
    const pct = (parseFloat(data.record.actual_position) * 100).toFixed(2);
    toast(`录入成功，实盘仓位 = ${pct}%`, 'success');
    $('live-form').reset();
    $('f-capital').value = currentMeta.initial_capital;
    delete $('f-capital').dataset.userTouched;
    recalcPreview();
    loadRecords();
    loadReconcile();
  } else {
    toast('录入失败: ' + (data.error || res.status), 'error');
  }
}

async function loadRecords() {
  const res = await fetch(`/api/live/records?strategy=${currentStrategy}`);
  const data = await res.json();
  const rows = data.records || [];
  if (rows.length === 0) {
    $('records-content').innerHTML = '<div class="empty"><strong>默认空仓状态</strong><br/>当前策略尚无任何实盘历史记录，从空仓开始（actual_position = 0，NAV = 1.0）。<br/>录入第一笔实盘交易后，本表与下方对账图将从该日期延续。</div>';
    return;
  }
  let html = '<table><thead><tr><th>日期</th><th>信号目标</th><th>成交价</th><th>持有股数</th><th>持仓市值</th><th>资金</th><th>实盘仓位</th><th>备注</th><th>创建时间</th><th></th></tr></thead><tbody>';
  for (const r of rows) {
    const price = parseFloat(r.exec_price);
    const shares = parseFloat(r.shares);
    const cap = parseFloat(r.capital) || currentMeta.initial_capital;
    const holding = (isFinite(price) && isFinite(shares)) ? price * shares : null;
    html += `<tr>
      <td>${r.date}</td>
      <td class="num">${r.signal_target ? (parseFloat(r.signal_target) * 100).toFixed(1) + '%' : '—'}</td>
      <td class="num">${isFinite(price) ? price.toFixed(3) : '—'}</td>
      <td class="num">${isFinite(shares) ? shares.toLocaleString('en-US') : '—'}</td>
      <td class="num">${holding !== null ? fmtMoney(holding) : '—'}</td>
      <td class="num">${cap ? fmtMoney(cap) : '—'}</td>
      <td class="num"><strong>${(parseFloat(r.actual_position) * 100).toFixed(2)}%</strong></td>
      <td>${r.notes || ''}</td>
      <td>${r.created_at}</td>
      <td><button class="btn btn-danger" onclick="deleteRecord(${r.record_id})">删除</button></td>
    </tr>`;
  }
  html += '</tbody></table>';
  $('records-content').innerHTML = html;
}

async function deleteRecord(id) {
  if (!confirm(`确认删除 record_id=${id}？`)) return;
  const res = await fetch(`/api/live/record/${id}`, { method: 'DELETE' });
  if (res.ok) {
    toast('删除成功');
    loadRecords();
    loadReconcile();
  } else {
    toast('删除失败', 'error');
  }
}

async function loadReconcile() {
  const res = await fetch(`/api/live/reconcile?strategy=${currentStrategy}`);
  const data = await res.json();
  // 把策略 meta（初始资金 / 币种 / lot）同步到表单标签
  if (data.initial_capital) {
    currentMeta = {
      initial_capital: data.initial_capital,
      currency: data.currency || 'CNY',
      lot_size: data.lot_size || 1,
    };
    applyMetaToUI();
  }
  // 空仓起点（CLAUDE.md 规则 15）：没有任何实盘记录时，明确显示「默认空仓」初始状态，
  // 不回放策略历史；录入第一笔后，下次刷新即从该日期延续。
  if (data.pending_cache) {
    $('recon-summary').innerHTML = `
      <div class="recon-pill">状态：<span class="v" style="color:var(--amber)">等待数据刷新</span></div>
      <div class="recon-pill">已录入：<span class="v">${data.live_records} 条</span></div>
      <div class="recon-pill">缓存截至：<span class="v">${data.cache_max_date || '—'}</span></div>
      <div class="recon-pill">首条录入：<span class="v">${data.first_record_date}</span></div>
    `;
    $('reconcile-chart').innerHTML = '';
    $('recon-msg').style.display = 'block';
    $('recon-msg').innerHTML = data.message;
    if (reconChart) { reconChart.dispose(); reconChart = null; }
    return;
  }
  if (data.empty_state) {
    $('recon-summary').innerHTML = `
      <div class="recon-pill">状态：<span class="v" style="color:var(--amber)">默认空仓</span></div>
      <div class="recon-pill">实盘 NAV：<span class="v">${(data.initial_nav || 1.0).toFixed(4)}</span></div>
      <div class="recon-pill">当前持仓：<span class="v">${((data.initial_position || 0) * 100).toFixed(1)}%</span></div>
    `;
    $('reconcile-chart').innerHTML = '';
    $('recon-msg').style.display = 'block';
    $('recon-msg').innerHTML = '<strong>默认空仓起点</strong>：实盘 NAV = 1.0，actual_position = 0。录入第一笔实盘交易后，对账图将从该日期开始延续。';
    if (reconChart) { reconChart.dispose(); reconChart = null; }
    return;
  }
  if (data.error || !data.series || data.series.length === 0) {
    $('recon-summary').innerHTML = '';
    $('reconcile-chart').innerHTML = '';
    $('recon-msg').style.display = 'block';
    $('recon-msg').textContent = data.message || data.error || '尚无对账数据（先录入至少一条实盘记录）';
    if (reconChart) { reconChart.dispose(); reconChart = null; }
    return;
  }
  $('recon-msg').style.display = 'none';
  const finalStrat = data.final_strategy_nav;
  const finalLive = data.final_live_nav;
  const diff = ((finalLive - finalStrat) * 100).toFixed(2);
  const diffColor = (finalLive - finalStrat) >= 0 ? 'var(--green)' : 'var(--red)';
  $('recon-summary').innerHTML = `
    <div class="recon-pill">起点：<span class="v">${data.start_date}</span></div>
    <div class="recon-pill">实盘记录数：<span class="v">${data.live_records}</span></div>
    <div class="recon-pill">策略 NAV：<span class="v">${finalStrat}</span></div>
    <div class="recon-pill">实盘 NAV：<span class="v">${finalLive}</span></div>
    <div class="recon-pill">差异：<span class="v" style="color:${diffColor}">${diff > 0 ? '+' : ''}${diff}%</span></div>
  `;
  const series = data.series;
  if (!reconChart) reconChart = echarts.init($('reconcile-chart'));
  reconChart.setOption({
    tooltip: { trigger: 'axis' },
    legend: { data: ['策略 NAV', '实盘 NAV', '仓位'], bottom: 0 },
    grid: { left: 50, right: 50, top: 30, bottom: 50 },
    xAxis: { type: 'category', data: series.map(r => r.date) },
    yAxis: [
      { type: 'value', name: 'NAV', scale: true, position: 'left' },
      { type: 'value', name: '仓位', min: 0, max: 1, position: 'right' },
    ],
    series: [
      { name: '策略 NAV', type: 'line', smooth: true, data: series.map(r => r.strategy_nav), color: '#0984e3' },
      { name: '实盘 NAV', type: 'line', smooth: true, data: series.map(r => r.live_nav), color: '#00b894' },
      { name: '仓位', type: 'line', yAxisIndex: 1, step: 'end', data: series.map(r => r.actual_position), color: '#f39c12', areaStyle: { opacity: 0.15 } },
    ],
  });
}

let allSignals = {};

async function loadAllSignals() {
  const grid = $('signal-dash-grid');
  grid.innerHTML = '<div class="empty" style="grid-column:1/-1;">加载中…</div>';
  const promises = ALL_STRATEGIES.map(async s => {
    try {
      const res = await fetch(signalUrl(s.id));
      const data = await res.json();
      allSignals[s.id] = data;
      return data;
    } catch(e) { return null; }
  });
  await Promise.all(promises);
  renderDashboard();
}

function renderDashboard() {
  const grid = $('signal-dash-grid');
  grid.innerHTML = ALL_STRATEGIES.map(s => {
    const sig = allSignals[s.id];
    if (!sig || sig.error) {
      return `<div class="signal-cell" style="cursor:pointer;opacity:0.5" onclick="selectFromDash('${s.id}')">
        <div class="lbl">${s.label}</div><div class="val" style="font-size:13px;color:var(--muted);">加载失败</div></div>`;
    }
    const target = sig.target_exposure || 0;
    const bs = (sig.bullish_score !== undefined && sig.bullish_score !== null) ? sig.bullish_score : 50;
    // 信号方向：与详情面板一致，以 bullish_score 为准
    let color, bg, dirLabel;
    if (bs >= 65) { dirLabel = '看多'; color = '#00b894'; bg = '#d1f2eb'; }
    else if (bs >= 50) { dirLabel = '偏多'; color = '#0984e3'; bg = '#d8efff'; }
    else if (bs >= 35) { dirLabel = '偏空'; color = '#f39c12'; bg = '#fef3e0'; }
    else { dirLabel = '看空'; color = '#d63031'; bg = '#ffe0e0'; }
    const pctLabel = (target * 100).toFixed(0) + '%';
    // 底仓覆盖标记：信号看空/偏空但 target 显著 > 0（base_floor 在起作用）
    const floorNote = (bs < 50 && target >= 0.3) ? ' ⚠底仓' : '';
    const selected = s.id === currentStrategy;
    return `<div class="signal-cell" style="cursor:pointer;border:${selected?'2px solid var(--accent)':'1px solid var(--border)'};background:${bg};border-radius:8px;padding:10px 12px;transition:all 0.15s;" onclick="selectFromDash('${s.id}')">
      <div class="lbl">${s.label}</div>
      <div class="val" style="font-size:17px;color:${color};">${dirLabel} <span style="font-size:14px;">${pctLabel}</span>${floorNote ? `<span style="font-size:11px;color:#e17055;">${floorNote}</span>` : ''}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px;">${sig.as_of_date || ''}</div>
    </div>`;
  }).join('');
}

function selectFromDash(sid) {
  if (sid === currentStrategy) return;
  $('strategy-select').value = sid;
  onStrategyChange();
}

async function updateIndexData() {
  const btn = document.getElementById('btn-update-index');
  const msg = document.getElementById('index-update-msg');
  if (!window.DataUpdateFlow) { msg.textContent = '更新模块未加载，请刷新页面'; return; }
  btn.disabled = true; btn.textContent = '拉取中...'; msg.textContent = '检查数据是否需要更新...';
  try {
    const r = await window.DataUpdateFlow.run({ type: 'index',
      onReload: async () => { msg.textContent = '数据刷新完成，重新加载信号...'; refreshAll(); }
    });
    if (r.aborted && r.reason === 'no_update_needed') { msg.textContent = '数据已最新'; }
    else if (r.aborted) { msg.style.color = 'var(--red)'; msg.textContent = r.detail || '更新中止'; }
    else { msg.textContent = '刷新完成'; }
  } finally { btn.disabled = false; btn.textContent = '↻ 同步最新数据'; }
}

function refreshAll() {
  loadAllSignals();
  loadSignal();
  loadRecords();
  loadReconcile();
}

initStrategySelect();
$('f-capital').addEventListener('change', () => { $('f-capital').dataset.userTouched = '1'; });
refreshAll();
</script>
</body>

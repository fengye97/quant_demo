<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大宗商品择时 · Gold Timing</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script src="/static/js/data_update_flow.js"></script>
<style>
:root {
  --bg: #1a1a1a; --bg-card: #252525; --bg-card-hover: #2a2a2a;
  --text: #e0e0e0; --text-secondary: #aaa; --muted: #777;
  --accent: #d4a017; --accent-light: #f0c040; --accent-dark: #8b6914;
  --green: #00b894; --red: #d63031; --orange: #e17055;
  --border: #333; --radius: 10px;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
.nav-bar {
  display:flex; gap:8px; padding:12px 20px; background:var(--bg-card);
  border-bottom:2px solid var(--accent-dark); position:sticky; top:0; z-index:100;
  flex-wrap:wrap; align-items:center;
}
.nav-bar a, .nav-bar button {
  color:var(--text-secondary); text-decoration:none; padding:6px 16px;
  border-radius:6px; font-size:14px; transition:all 0.2s; background:none; border:1px solid transparent;
  cursor:pointer; font-family:inherit;
}
.nav-bar a:hover, .nav-bar button:hover { background:var(--bg-card-hover); color:#fff; }
.nav-bar a.active { background:var(--accent-dark); color:#fff; border-color:var(--accent); }
.container { max-width:1200px; margin:0 auto; padding:20px; }
.page-title { font-size:22px; font-weight:700; margin-bottom:4px; color:var(--accent-light); }
.page-subtitle { font-size:13px; color:var(--text-secondary); margin-bottom:20px; }
.card {
  background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius);
  padding:20px; margin-bottom:16px;
}
.card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.card-title { font-size:16px; font-weight:600; }
.strategy-grid { display:grid; grid-template-columns:1fr; gap:16px; }
@media(min-width:768px){ .strategy-grid { grid-template-columns:1fr 1fr; } }
.signal-badge {
  display:inline-block; padding:4px 12px; border-radius:20px; font-size:13px; font-weight:700;
}
.signal-long { background:#2d3436; color:var(--green); border:1px solid var(--green); }
.signal-short { background:#2d3436; color:var(--red); border:1px solid var(--red); }
.signal-neutral { background:#2d3436; color:var(--orange); border:1px solid var(--orange); }
.metrics-row { display:flex; gap:12px; flex-wrap:wrap; }
.metric-chip {
  background:var(--bg); border:1px solid var(--border); border-radius:8px;
  padding:10px 14px; text-align:center; min-width:100px; flex:1;
}
.metric-label { font-size:11px; color:var(--muted); margin-bottom:2px; }
.metric-value { font-size:16px; font-weight:700; }
.metric-value.positive { color:var(--green); }
.metric-value.negative { color:var(--red); }
.param-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:8px; }
.param-row label { font-size:12px; color:var(--text-secondary); min-width:80px; }
.param-row input { width:70px; padding:4px 8px; border-radius:4px; border:1px solid var(--border); background:var(--bg); color:var(--text); font-size:13px; }
.btn {
  padding:6px 16px; border-radius:6px; border:none; font-size:13px; font-weight:600;
  cursor:pointer; transition:all 0.2s; font-family:inherit;
}
.btn-primary { background:var(--accent-dark); color:#fff; }
.btn-primary:hover { background:var(--accent); }
.btn-secondary { background:var(--bg); color:var(--text); border:1px solid var(--border); }
.btn-secondary:hover { border-color:var(--accent); }
.chart-container { width:100%; height:340px; margin-top:12px; }
.positions-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:12px; }
.position-chip {
  background:var(--bg); border:1px solid var(--border); border-radius:6px;
  padding:8px 12px; font-size:12px;
}
.formula-block {
  background:var(--bg); border-left:3px solid var(--accent); border-radius:4px;
  padding:10px 14px; margin-bottom:8px; font-size:12px;
}
.formula-title { font-weight:600; color:var(--accent-light); margin-bottom:4px; }
.formula-expr { font-family:monospace; font-size:11px; color:var(--text-secondary); margin-bottom:2px; }
.formula-desc { color:var(--muted); font-size:11px; }
.hidden { display:none; }
#loading {
  position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:999;
  display:flex; align-items:center; justify-content:center; flex-direction:column;
}
.spinner {
  width:40px; height:40px; border:3px solid var(--border);
  border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite;
}
@keyframes spin { to{transform:rotate(360deg);} }
#loading-status { margin-top:12px; font-size:14px; color:var(--text-secondary); }
</style>
</head>
<body>

<!-- Nav Bar -->
<div class="nav-bar">
  <a href="/">选股</a>
  <a href="/timing">A股择时</a>
  <a href="/us_timing">美股择时</a>
  <a href="/hk_timing">港股择时</a>
  <a href="/commodity" class="active">大宗商品</a>
  <a href="/live">实盘</a>
  <span style="flex:1;"></span>
  <button class="btn btn-secondary" onclick="updateIndexData()" id="btn-update-index" style="font-size:12px;padding:4px 12px;">↻ 刷新数据</button>
  <span id="index-update-msg" style="font-size:11px;color:var(--text-secondary);"></span>
</div>

<div id="loading" class="hidden">
  <div class="spinner"></div>
  <div id="loading-status">加载中...</div>
</div>

<div class="container">
  <div class="page-title">大宗商品择时</div>
  <div class="page-subtitle">黄金ETF (518880) · 基于趋势+突破+MACD的择时信号 · 与股票低相关</div>

  <div id="error-banner" style="display:none;background:#553333;color:#ff6b6b;padding:12px;border-radius:8px;margin-bottom:16px;"></div>

  <div class="strategy-grid" id="strategy-grid"></div>
</div>

<script>
const CHARTS = {};
let allData = {};
let currentStrategy = 'gold_timing';
let strategyMeta = {};

function showLoading(msg) {
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('loading-status').textContent = msg;
}
function hideLoading() { document.getElementById('loading').classList.add('hidden'); }

async function init() {
  showLoading('加载大宗商品数据...');
  try {
    const resp = await fetch('/api/commodity/info');
    const info = await resp.json();
    if (info.error) throw new Error(info.error);
    document.querySelector('.page-subtitle').textContent =
      `黄金ETF (518880) · ${info.data_min_date} ~ ${info.data_max_date} · 趋势+突破+MACD`;

    const slResp = await fetch('/api/commodity/strategy_list');
    strategyMeta = await slResp.json();
    if (!Array.isArray(strategyMeta)) throw new Error('策略列表格式异常');

    currentStrategy = strategyMeta[0]?.id || 'gold_timing';
    await loadBacktest(currentStrategy);
    renderCards();
    hideLoading();
  } catch(e) {
    hideLoading();
    document.getElementById('error-banner').style.display = 'block';
    document.getElementById('error-banner').textContent = '初始化失败: ' + e.message;
  }
}

async function loadBacktest(sid) {
  showLoading('加载回测数据...');
  try {
    const qs = new URLSearchParams({ strategy: sid, profile: 'best' });
    const resp = await fetch('/api/commodity/backtest?' + qs.toString());
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    allData[sid] = data;
  } finally { hideLoading(); }
}

function renderCards() {
  const grid = document.getElementById('strategy-grid');
  grid.innerHTML = '';
  for (const meta of strategyMeta) {
    const data = allData[meta.id];
    if (!data) continue;
    const card = buildCard(meta, data);
    grid.appendChild(card);
  }
  // Init charts after DOM rendered
  setTimeout(() => {
    for (const meta of strategyMeta) {
      if (allData[meta.id]) initChart(meta.id);
    }
  }, 100);
}

function formatPct(v) {
  if (v == null || isNaN(v)) return '—';
  return (v >= 0 ? '+' : '') + (v * 100).toFixed(2) + '%';
}
function formatNum(v, d) { return v != null && isFinite(v) ? v.toFixed(d || 2) : '—'; }

function buildCard(meta, data) {
  const m = data.metrics || {};
  const sig = data.current_signal || {};
  const posLabel = sig.current_action === 'buy' ? '看多' : sig.current_action === 'sell' ? '看空' : '持有';
  const posClass = sig.current_action === 'buy' ? 'signal-long' : sig.current_action === 'sell' ? 'signal-short' : 'signal-neutral';
  const expPct = (sig.target_exposure != null) ? (sig.target_exposure * 100).toFixed(0) + '%' : '—';
  const nav = data.equity_curve && data.equity_curve.length > 0
    ? data.equity_curve[data.equity_curve.length - 1][1] : '—';
  const params = meta.parameters || [];
  const formulas = meta.formula_blocks || [];

  const div = document.createElement('div');
  div.className = 'card';
  div.innerHTML = `
    <div class="card-header">
      <div>
        <div class="card-title" style="color:var(--accent-light);">${meta.name} · ${meta.index_name}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px;">${meta.description || ''}</div>
      </div>
      <span class="signal-badge ${posClass}">${posLabel} · ${expPct}</span>
    </div>

    <!-- Signal + Metrics -->
    <div class="metrics-row">
      <div class="metric-chip"><div class="metric-label">累积净值</div><div class="metric-value">${formatNum(nav, 4)}</div></div>
      <div class="metric-chip"><div class="metric-label">年化收益</div><div class="metric-value ${(m.annual_return||0)>=0?'positive':'negative'}">${formatPct(m.annual_return)}</div></div>
      <div class="metric-chip"><div class="metric-label">最大回撤</div><div class="metric-value negative">${formatPct(m.max_drawdown)}</div></div>
      <div class="metric-chip"><div class="metric-label">Calmar</div><div class="metric-value">${formatNum(m.calmar)}</div></div>
      <div class="metric-chip"><div class="metric-label">月胜率</div><div class="metric-value">${formatPct(m.win_rate)}</div></div>
      <div class="metric-chip"><div class="metric-label">当前信号日</div><div class="metric-value" style="font-size:12px;">${sig.as_of_date || '—'}</div></div>
    </div>

    <!-- Position / Details -->
    <div style="margin-top:12px;font-size:12px;color:var(--text-secondary);">
      信号原因：${sig.current_reason || '—'}<br>
      ${sig.etf_code ? 'ETF: ' + sig.etf_code + ' · ' + (sig.etf_name || '') : ''}
    </div>

    <!-- Parameters -->
    <details style="margin-top:12px;">
      <summary style="cursor:pointer;font-size:13px;color:var(--accent-light);">策略参数 & 公式</summary>
      <div style="margin-top:8px;">
        ${params.map(p => `
          <div class="param-row">
            <label>${p.label}${p.unit ? ' (' + p.unit + ')' : ''}</label>
            <input type="number" value="${p.default}" step="${p.step || 1}"
              data-key="${p.key}" data-strategy="${meta.id}" onchange="onParamChange(this)"
              style="width:${p.key.length > 12 ? 100 : 70}px;">
            <span style="font-size:11px;color:var(--muted);">${p.description || ''}</span>
          </div>
        `).join('')}
        <div style="margin-top:8px;">
          ${formulas.map(f => `
            <div class="formula-block">
              <div class="formula-title">${f.title}</div>
              <div class="formula-expr">${f.expression}</div>
              <div class="formula-desc">${f.explanation}</div>
            </div>
          `).join('')}
        </div>
        <button class="btn btn-primary" style="margin-top:8px;" onclick="applyParams('${meta.id}')">应用并重跑</button>
      </div>
    </details>

    <!-- Chart -->
    <div class="chart-container" id="chart-${meta.id}"></div>

    <!-- Position details -->
    <div class="positions-grid" style="margin-top:12px;">
      <div class="position-chip"><b>当前仓位</b><br>目标: ${expPct} · 信号: ${posLabel}</div>
      <div class="position-chip"><b>训练截止</b><br>${data.training_cutoff || '—'}</div>
    </div>
  `;
  return div;
}

function initChart(sid) {
  const dom = document.getElementById('chart-' + sid);
  if (!dom) return;
  if (CHARTS[sid]) CHARTS[sid].dispose();
  const chart = echarts.init(dom);
  CHARTS[sid] = chart;

  const data = allData[sid];
  if (!data) return;

  const curve = data.equity_curve || [];
  const dates = curve.map(d => d.date);
  const navs = curve.map(d => d.value);

  const trainEnd = data.training_cutoff || '2025-11-30';

  chart.setOption({
    backgroundColor: 'transparent',
    tooltip: { trigger: 'axis' },
    grid: { left: 60, right: 20, top: 20, bottom: 30 },
    xAxis: { type: 'category', data: dates, axisLabel: { color: '#888', fontSize: 10,
      formatter: v => v ? v.slice(0, 7) : '' }, axisLine: { lineStyle: { color: '#444' } } },
    yAxis: { type: 'value', axisLabel: { color: '#888', fontSize: 10,
      formatter: v => v.toFixed(2) }, splitLine: { lineStyle: { color: '#333' } } },
    series: [{
      type: 'line', data: navs, smooth: false, symbol: 'none',
      lineStyle: { color: '#d4a017', width: 2 },
      areaStyle: { color: 'rgba(212,160,23,0.08)' },
      markLine: {
        silent: true, symbol: 'none',
        lineStyle: { color: '#e17055', type: 'dashed', width: 1 },
        data: [{ xAxis: trainEnd, label: { formatter: '训练截止', color: '#e17055', fontSize: 10 } }]
      }
    }]
  });
}

async function onParamChange(input) {
  // Parameter changes are collected and applied via "应用并重跑" button
}

async function applyParams(sid) {
  const inputs = document.querySelectorAll(`input[data-strategy="${sid}"]`);
  const params = {};
  inputs.forEach(inp => { params[inp.dataset.key] = inp.value; });
  showLoading('重新计算...');
  try {
    const qs = new URLSearchParams({ strategy: sid, profile: 'best', ...params });
    const resp = await fetch('/api/commodity/backtest?' + qs.toString());
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    allData[sid] = data;
    renderCards();
    hideLoading();
  } catch(e) {
    hideLoading();
    alert('重跑失败: ' + e.message);
  }
}

async function updateIndexData() {
  const btn = document.getElementById('btn-update-index');
  const msg = document.getElementById('index-update-msg');
  if (!window.DataUpdateFlow) { msg.textContent = '更新模块未加载'; return; }
  btn.disabled = true; btn.textContent = '拉取中...'; msg.textContent = '检查数据...';
  try {
    const r = await window.DataUpdateFlow.run({ type: 'index',
      onReload: async () => { msg.textContent = '完成，重新加载...'; location.reload(); }
    });
    if (r.aborted) { msg.textContent = r.reason === 'no_update_needed' ? '数据已最新' : r.detail || '更新中止'; }
    else { msg.textContent = '刷新完成'; }
  } finally { btn.disabled = false; btn.textContent = '↻ 刷新数据'; }
}

document.addEventListener('DOMContentLoaded', init);
window.addEventListener('resize', () => Object.values(CHARTS).forEach(c => c.resize()));
</script>
</body>
</html>

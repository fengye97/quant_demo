<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>量化择时策略</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #fff;
      --text: #2d3436;
      --text-secondary: #636e72;
      --accent: #6c5ce7;
      --green: #00b894;
      --red: #d63031;
      --border: #e9edf5;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
    .app { max-width: 1440px; margin: 0 auto; padding: 24px; }
    .header, .controls-bar, .summary-grid, .section-card, .panel { background: var(--panel); border-radius: 16px; box-shadow: 0 6px 24px rgba(15, 23, 42, 0.06); }
    .header { padding: 24px; display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 18px; }
    .header h1 { margin: 0 0 8px; font-size: 28px; }
    .subtitle { color: var(--text-secondary); margin: 0; }
    .controls-bar { padding: 18px; display: flex; gap: 16px; flex-wrap: wrap; align-items: end; margin-bottom: 18px; }
    .control-group { display: flex; flex-direction: column; gap: 6px; min-width: 180px; }
    .control-group label { font-size: 13px; color: var(--text-secondary); }
    select, input[type="date"] { border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; font-size: 14px; background: #fff; }
    .btn { border: none; border-radius: 10px; padding: 10px 16px; cursor: pointer; font-weight: 600; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary { background: #eef2ff; color: var(--accent); }
    .summary-grid { padding: 18px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 18px; }
    .summary-card { border: 1px solid var(--border); border-radius: 14px; padding: 16px; background: linear-gradient(180deg, #fff, #fafbff); }
    .summary-card h3 { margin: 0 0 10px; font-size: 18px; }
    .signal-pill { display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; }
    .signal-on { background: rgba(0,184,148,.12); color: var(--green); }
    .signal-off { background: rgba(214,48,49,.12); color: var(--red); }
    .muted { color: var(--text-secondary); font-size: 13px; }
    .section-card { padding: 18px; margin-bottom: 18px; }
    .section-header { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 14px; }
    .metrics-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
    .metric-mini { background: #fafbff; border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
    .metric-mini .label { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; }
    .metric-mini .value { font-size: 20px; font-weight: 700; }
    .chart-box { width: 100%; height: 430px; }
    .panel { padding: 18px; margin-bottom: 18px; }
    .panel-title { font-size: 18px; font-weight: 700; margin-bottom: 14px; }
    .factor-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
    .factor-item { border: 1px solid var(--border); border-radius: 12px; padding: 14px; background: #fafbff; }
    .factor-name { font-weight: 700; margin-bottom: 4px; }
    .factor-desc { font-size: 13px; color: var(--text-secondary); margin-bottom: 10px; line-height: 1.6; }
    .slider-row { display: flex; gap: 10px; align-items: center; }
    .slider-row input { flex: 1; }
    .slider-value { min-width: 56px; text-align: right; font-weight: 700; color: var(--accent); }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 8px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: top; }
    th { text-align: left; color: var(--text-secondary); font-weight: 600; }
    .hidden { display: none; }
    .error-banner { background: rgba(214,48,49,.08); color: var(--red); padding: 12px 14px; border-radius: 10px; margin-bottom: 14px; }
    .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,.65); display: flex; align-items: center; justify-content: center; z-index: 10; }
    .loading-spinner { width: 42px; height: 42px; border: 4px solid #dfe6ff; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 1100px) { .summary-grid, .metrics-row, .factor-grid { grid-template-columns: 1fr; } .header { flex-direction: column; } }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div>
        <h1>量化择时策略 · 指数买卖时机分析</h1>
        <p class="subtitle">三个指数分别维护独立策略，并分别给出 CSI1000 / 科创50 / 创业板 的择时信号。</p>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="btn btn-secondary" onclick="window.location.href='/'">返回选股页</button>
        <span id="data-date-badge" class="signal-pill signal-on">数据更新至: ---</span>
      </div>
    </div>

    <div class="controls-bar">
      <div class="control-group">
        <label>指数策略</label>
        <select id="strategy-select" onchange="onStrategyChange()"></select>
      </div>
      <div class="control-group">
        <label>对照基准</label>
        <select id="benchmark-select" onchange="runBacktest()">
          <option value="csi1000">CSI 1000</option>
          <option value="chinext">创业板指数</option>
          <option value="star50">科创50指数</option>
        </select>
      </div>
      <div class="control-group">
        <label>起始日期</label>
        <input type="date" id="start-date" />
      </div>
      <div class="control-group">
        <label>结束日期</label>
        <input type="date" id="end-date" />
      </div>
      <button class="btn btn-primary" onclick="runBacktest()">运行回测</button>
    </div>

    <div id="error-banner" class="error-banner hidden"></div>
    <div id="loading" class="loading-overlay hidden"><div class="loading-spinner"></div></div>

    <div class="summary-grid" id="signal-summary-grid"></div>

    <div class="panel">
      <div class="panel-title">择时参数</div>
      <div class="factor-grid" id="factor-grid"></div>
    </div>

    <div class="section-card">
      <div class="section-header">
        <div>
          <div style="font-size:20px;font-weight:700;" id="detail-title">指数策略详情</div>
          <div class="muted" id="detail-subtitle"></div>
        </div>
      </div>
      <div class="metrics-row" id="metrics-row"></div>
      <div class="chart-box" id="chart-main"></div>
    </div>

    <div class="section-card">
      <div class="section-header">
        <div style="font-size:20px;font-weight:700;">当前指标快照</div>
      </div>
      <table>
        <tbody id="snapshot-body"></tbody>
      </table>
    </div>

    <div class="section-card">
      <div class="section-header">
        <div style="font-size:20px;font-weight:700;">最近信号与交易</div>
      </div>
      <table>
        <thead>
          <tr>
            <th>日期</th><th>动作</th><th>持仓</th><th>收盘价</th><th>得分</th><th>原因</th>
          </tr>
        </thead>
        <tbody id="signals-body"></tbody>
      </table>
    </div>
  </div>

  <script>
    const charts = {};
    let timingInfo = null;
    let strategyList = [];
    let factorConfig = null;
    let backtestData = null;
    let summaryData = [];

    function formatSignal(action, position) {
      const isOn = Number(position) === 1;
      return `<span class="signal-pill ${isOn ? 'signal-on' : 'signal-off'}">${action || (isOn ? 'hold' : 'flat')}</span>`;
    }

    function renderMetricsRow(data) {
      const m = data.metrics || {};
      const cards = [
        { label: '累积净值', value: m.cumulative_return ?? '—' },
        { label: '年化收益', value: m.annual_return ?? '—' },
        { label: '最大回撤', value: m.max_drawdown ?? '—', sub: `${m.max_dd_start || '—'} → ${m.max_dd_end || '—'}` },
        { label: '月度胜率', value: ((data.win_rate || 0) * 100).toFixed(1) + '%' },
        { label: '收益/回撤比', value: m.calmar_ratio ?? '—' },
        { label: '最终资金', value: m.final_capital ?? '—' },
        { label: '总收益率', value: m.total_return_pct ?? '—' },
        { label: '年化Alpha', value: m.annual_alpha ?? '—' },
      ];
      document.getElementById('metrics-row').innerHTML = cards.map(c => `
        <div class="metric-mini">
          <div class="label">${c.label}</div>
          <div class="value">${c.value}</div>
          ${c.sub ? `<div class="muted">${c.sub}</div>` : ''}
        </div>
      `).join('');
    }

    function renderSummaryGrid() {
      const grid = document.getElementById('signal-summary-grid');
      grid.innerHTML = (summaryData || []).map(item => `
        <div class="summary-card">
          <h3>${item.index_name}</h3>
          <div style="margin-bottom:10px;">${formatSignal(item.action, item.position)}</div>
          <div class="muted" style="margin-bottom:6px;">最近信号日期: ${item.date}</div>
          <div class="muted" style="margin-bottom:6px;">当前净值: <b>${Number(item.nav || 0).toFixed(4)}</b></div>
          <div style="font-size:14px;line-height:1.7;">${item.reason_summary || '—'}</div>
        </div>
      `).join('');
    }

    function renderFactorPanel() {
      const grid = document.getElementById('factor-grid');
      const params = factorConfig?.parameters || [];
      grid.innerHTML = params.map(p => `
        <div class="factor-item">
          <div class="factor-name">${p.label}</div>
          <div class="factor-desc">${p.description}</div>
          <div class="slider-row">
            <input type="range" class="factor-slider" data-key="${p.key}" min="${p.min}" max="${p.max}" step="${p.step}" value="${p.default}" oninput="updateSliderValue(this)" />
            <span class="slider-value" id="val-${p.key}">${p.default}${p.unit || ''}</span>
          </div>
        </div>
      `).join('');
    }

    function updateSliderValue(slider) {
      const el = document.getElementById('val-' + slider.dataset.key);
      const unit = (factorConfig?.parameters || []).find(p => p.key === slider.dataset.key)?.unit || '';
      if (el) el.textContent = slider.value + unit;
    }

    function buildChart() {
      const dom = document.getElementById('chart-main');
      if (!charts.main) charts.main = echarts.init(dom);
      const curve = backtestData?.equity_curve || [];
      const benchmarkCurves = backtestData?.benchmark_curves || [];
      const activeBenchmarkId = backtestData?.active_benchmark?.id;
      const selectedBenchmark = benchmarkCurves.find(x => x.id === activeBenchmarkId) || benchmarkCurves[0];
      const option = {
        tooltip: { trigger: 'axis' },
        legend: { top: 0 },
        grid: { left: 60, right: 20, top: 35, bottom: 45 },
        xAxis: { type: 'category', data: curve.map(d => d.date), boundaryGap: false },
        yAxis: { type: 'value', name: '累积净值' },
        series: [
          {
            name: '策略',
            type: 'line',
            data: curve.map(d => d.value),
            smooth: false,
            lineStyle: { color: '#6c5ce7', width: 2 },
          },
          ...(selectedBenchmark ? [{
            name: selectedBenchmark.name,
            type: 'line',
            data: selectedBenchmark.curve.map(d => d.value),
            smooth: false,
            lineStyle: { color: '#95a5a6', type: 'dashed', width: 1.5 },
          }] : [])
        ]
      };
      charts.main.setOption(option, true);
      charts.main.resize();
    }

    function renderSnapshots() {
      const body = document.getElementById('snapshot-body');
      const items = backtestData?.indicator_snapshots || {};
      body.innerHTML = Object.entries(items).map(([k, v]) => `
        <tr><th style="width:220px;">${k}</th><td>${typeof v === 'number' ? v.toFixed(4) : v}</td></tr>
      `).join('') || '<tr><td class="muted">暂无指标快照</td></tr>';
    }

    function renderSignals() {
      const body = document.getElementById('signals-body');
      const rows = (backtestData?.signals || []).slice(-20).reverse();
      body.innerHTML = rows.map(item => `
        <tr>
          <td>${item.date}</td>
          <td>${formatSignal(item.action, item.position)}</td>
          <td>${Number(item.position) === 1 ? '持有' : '空仓'}</td>
          <td>${Number(item.close || 0).toFixed(2)}</td>
          <td>${Number(item.score || 0).toFixed(4)}</td>
          <td>
            <div style="font-weight:600;margin-bottom:4px;">${item.reason_summary || '—'}</div>
            <div class="muted">${(item.reason_detail || []).join('；')}</div>
          </td>
        </tr>
      `).join('');
    }

    function renderAll() {
      if (!backtestData) return;
      document.getElementById('detail-title').textContent = backtestData.active_index?.name || '指数策略详情';
      document.getElementById('detail-subtitle').textContent = `${backtestData.date_range.start} → ${backtestData.date_range.end} · 当前基准 ${backtestData.active_benchmark?.name || '—'}`;
      renderMetricsRow(backtestData);
      renderSnapshots();
      renderSignals();
      buildChart();
    }

    async function loadTimingInfo() {
      const resp = await fetch('/api/timing/info');
      timingInfo = await resp.json();
      if (timingInfo?.data_max_date) {
        document.getElementById('data-date-badge').textContent = '数据更新至: ' + timingInfo.data_max_date;
        document.getElementById('start-date').max = timingInfo.data_max_date;
        document.getElementById('end-date').max = timingInfo.data_max_date;
      }
    }

    async function loadStrategyList() {
      const resp = await fetch('/api/timing/strategy_list');
      strategyList = await resp.json();
      const select = document.getElementById('strategy-select');
      select.innerHTML = (strategyList || []).map(item => `
        <option value="${item.id}">${item.name}</option>
      `).join('');
      if (strategyList.length > 0) select.value = strategyList[0].id;
    }

    async function loadSummarySignals() {
      const resp = await fetch('/api/timing/signals');
      summaryData = await resp.json();
      renderSummaryGrid();
    }

    async function onStrategyChange() {
      const strategy = document.getElementById('strategy-select').value;
      const resp = await fetch(`/api/timing/params?strategy=${strategy}`);
      factorConfig = await resp.json();
      renderFactorPanel();
      await runBacktest();
    }

    async function runBacktest() {
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('error-banner').classList.add('hidden');
      try {
        const strategy = document.getElementById('strategy-select').value;
        const benchmark = document.getElementById('benchmark-select').value;
        const start = document.getElementById('start-date').value;
        const end = document.getElementById('end-date').value;
        let params = `strategy=${strategy}&benchmark=${benchmark}`;
        if (start) params += `&start=${start}`;
        if (end) params += `&end=${end}`;
        document.querySelectorAll('.factor-slider').forEach(s => {
          params += `&${s.dataset.key}=${s.value}`;
        });
        const resp = await fetch(`/api/timing/backtest?${params}&compact=1`);
        if (!resp.ok) {
          const err = await resp.json();
          throw new Error(err.error || '请求失败');
        }
        backtestData = await resp.json();
        renderAll();
      } catch (e) {
        document.getElementById('error-banner').textContent = `回测失败: ${e.message}`;
        document.getElementById('error-banner').classList.remove('hidden');
      } finally {
        document.getElementById('loading').classList.add('hidden');
      }
    }

    async function init() {
      await Promise.all([
        loadTimingInfo(),
        loadStrategyList(),
        loadSummarySignals(),
      ]);
      await onStrategyChange();
      window.addEventListener('resize', () => charts.main && charts.main.resize());
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>

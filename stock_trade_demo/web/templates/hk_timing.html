<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>港股择时策略</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <script>window.echarts||document.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"><\/script>');</script>
  <style>
    :root {
      --bg: #f5f6fa; --card: #fff; --text: #2d3436; --muted: #636e72;
      --border: #e0e0e0; --accent: #e83938; --accent-hover: #c62828;
      --green: #00b894; --red: #d63031;
      --shadow: 0 2px 12px rgba(0,0,0,0.06); --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Heiti SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    .app { max-width: 1600px; margin: 0 auto; padding: 20px; }

    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; flex-wrap: wrap; gap: 12px; }
    .header h1 { font-size: 22px; font-weight: 700; }
    .header .subtitle { font-size: 13px; color: var(--muted); margin-top: 3px; }

    .controls-bar { background: var(--card); border-radius: var(--radius); padding: 13px 18px; margin-bottom: 16px; box-shadow: var(--shadow); display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .period-btn { padding: 5px 13px; border: 1px solid var(--border); border-radius: 999px; font-size: 13px; background: var(--bg); cursor: pointer; font-weight: 600; color: var(--muted); transition: all 0.15s; }
    .period-btn:hover { border-color: var(--accent); color: var(--accent); }
    .period-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .controls-sep { width: 1px; height: 22px; background: var(--border); margin: 0 4px; }
    .date-input { padding: 6px 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; background: var(--bg); color: var(--text); }
    .btn { padding: 7px 18px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: #e8e8e8; }

    .indices-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin-bottom: 16px; }
    @media (max-width: 900px) { .indices-grid { grid-template-columns: 1fr; } }

    .index-card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; display: flex; flex-direction: column; }
    .card-header { padding: 14px 16px 0; }
    .card-title-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .card-title { font-size: 18px; font-weight: 700; }
    .card-desc { font-size: 12px; color: var(--muted); }

    .signal-bar { padding: 10px 16px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 14px; }
    .signal-main { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .signal-actions { display: flex; align-items: center; justify-content: flex-end; flex: 1; min-width: 0; }
    .signal-label { font-size: 12px; color: var(--muted); white-space: nowrap; }
    .signal-badge { display: inline-flex; align-items: center; gap: 5px; padding: 6px 16px; border-radius: 10px; font-size: 20px; font-weight: 800; white-space: nowrap; letter-spacing: 0.5px; }
    .badge-buy  { background: rgba(214,48,49,.12); color: var(--red); }
    .badge-sell { background: rgba(0,184,148,.12); color: var(--green); }
    .badge-hold { background: rgba(232,57,56,.12); color: var(--accent); }
    .badge-flat { background: rgba(99,110,114,.1); color: var(--muted); }

    .metrics-strip { display: grid; grid-template-columns: repeat(3, 1fr); border-bottom: 1px solid var(--border); }
    .metric-cell { padding: 9px 13px; border-right: 1px solid var(--border); }
    .metric-cell:last-child { border-right: none; }
    .metric-cell .lbl { font-size: 11px; color: var(--muted); margin-bottom: 1px; white-space: nowrap; }
    .metric-cell .val { font-size: 15px; font-weight: 700; }
    .val-pos  { color: var(--red); }
    .val-neg  { color: var(--green); }
    .val-neu  { color: var(--text); }

    .position-strip { display: grid; grid-template-columns: repeat(2, 1fr); border-bottom: 1px solid var(--border); }
    .position-item { padding: 9px 13px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .position-item:nth-child(2n) { border-right: none; }
    .position-item .lbl { font-size: 11px; color: var(--muted); margin-bottom: 1px; white-space: nowrap; }
    .position-item .val { font-size: 14px; font-weight: 700; }

    .chart-col-wrap { height: 480px; position: relative; padding: 8px 12px 12px; }
    .col-chart-inner { width: 100%; height: 100%; }

    .card-footer { padding: 9px 14px; font-size: 12px; color: var(--muted); border-top: 1px solid var(--border); line-height: 1.5; flex-shrink: 0; }
    .card-footer strong { color: var(--text); }

    .formula-section { border-top: 1px solid var(--border); padding: 12px 14px 4px; background: #fcfdff; }
    .formula-title { font-size: 14px; font-weight: 700; margin-bottom: 8px; }
    .formula-summary { font-size: 12px; color: var(--muted); line-height: 1.7; margin-bottom: 10px; }
    .formula-block { background: var(--bg); border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; }
    .formula-block-title { font-size: 12px; font-weight: 700; margin-bottom: 4px; }
    .formula-expr { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; color: #1f3c88; line-height: 1.6; margin-bottom: 4px; word-break: break-word; }
    .formula-note { font-size: 12px; color: var(--muted); line-height: 1.6; }

    .param-section { border-top: 1px solid var(--border); padding: 12px 14px 14px; }
    .param-header { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 10px; }
    .param-title { font-size: 14px; font-weight: 700; }
    .factor-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 10px; }
    .factor-item { background: var(--bg); border-radius: 10px; padding: 12px; }
    .factor-name { font-weight: 600; font-size: 13px; margin-bottom: 3px; }
    .factor-desc { font-size: 12px; color: var(--muted); margin-bottom: 9px; line-height: 1.5; }
    .slider-row { display: flex; align-items: center; gap: 10px; }
    .slider-row input[type=range] { flex: 1; accent-color: var(--accent); }
    .slider-row select { flex: 1; }
    .slider-val { min-width: 58px; text-align: right; font-weight: 700; color: var(--accent); font-size: 13px; }

    .section-card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 18px; margin-bottom: 16px; }
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    .section-title { font-size: 16px; font-weight: 700; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: #eef2f7; padding: 9px 10px; text-align: left; font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }
    td { padding: 9px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
    .action-buy  { color: var(--red); font-weight: 700; }
    .action-sell { color: var(--green); font-weight: 700; }

    .hidden { display: none !important; }
    .loading-overlay { position: fixed; inset: 0; background: rgba(255,255,255,.82); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .loading-spinner { width: 44px; height: 44px; border: 4px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-banner { background: #ffeaa7; border: 1px solid #fdcb6e; border-radius: 8px; padding: 12px 16px; margin-bottom: 14px; font-size: 14px; color: #8a6800; }
    select.ctrl-select { padding: 6px 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; background: var(--bg); color: var(--text); cursor: pointer; }

    .changelog-item { border: 1px solid var(--border); border-radius: 14px; padding: 16px; background: linear-gradient(180deg, #fcfdff 0%, #f8fbff 100%); }
    .changelog-kicker { font-size: 11px; color: var(--accent); font-weight: 700; letter-spacing: .6px; margin-bottom: 8px; }
    .changelog-title { font-size: 16px; font-weight: 700; line-height: 1.4; }
    .changelog-summary { font-size: 13px; color: var(--text); line-height: 1.7; margin-bottom: 10px; }
    .changelog-list { margin-left: 18px; color: var(--muted); font-size: 12px; line-height: 1.7; }
  </style>
</head>
<body>
<div class="app">

  <div class="header">
    <div>
      <h1>港股择时策略 · 恒生指数/恒生科技买卖时机分析</h1>
      <div class="subtitle">恒生ETF(159920) · 恒生科技ETF(513180) · 趋势+突破+MACD择时 · QDII T+0 交收</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <a href="/" class="btn btn-secondary" style="text-decoration:none;">选股策略</a>
      <a href="/timing" class="btn btn-secondary" style="text-decoration:none;">A股择时</a>
      <a href="/us_timing" class="btn btn-secondary" style="text-decoration:none;">美股择时</a>
      <a href="/hk_timing" class="btn btn-secondary" style="text-decoration:none;background:var(--accent);color:#fff;">港股择时</a>
      <a href="/commodity" class="btn btn-secondary" style="text-decoration:none;">大宗商品</a>
      <a href="/live" class="btn btn-secondary" style="text-decoration:none;">实盘记录</a>
      <span id="data-date-badge" style="font-size:12px;color:var(--muted);">数据更新至: —</span>
    </div>
  </div>

  <div id="error-banner" class="error-banner hidden"></div>

  <div id="loading" class="loading-overlay hidden">
    <div style="text-align:center;">
      <div class="loading-spinner" style="margin:0 auto 16px;"></div>
      <div id="loading-status" style="font-size:14px;color:var(--muted);margin-bottom:8px;">正在连接服务器...</div>
      <div id="loading-time" style="font-size:22px;font-weight:700;color:var(--accent);">—</div>
      <div style="margin-top:10px;width:260px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;">
        <div id="loading-progress-bar" style="height:100%;width:0%;background:var(--accent);border-radius:2px;transition:width .3s;"></div>
      </div>
    </div>
  </div>

  <div class="controls-bar">
    <button class="btn btn-secondary" onclick="updateIndexData()" id="btn-update-index" style="margin-right:8px;">↻ 刷新数据</button>
    <span id="index-update-msg" style="font-size:12px;color:var(--muted);"></span>
    <div class="controls-sep"></div>
    <button class="period-btn" data-months="all" onclick="setQuickPeriod('all')">全部</button>
    <button class="period-btn" data-months="60"  onclick="setQuickPeriod(60)">近五年</button>
    <button class="period-btn" data-months="36"  onclick="setQuickPeriod(36)">近三年</button>
    <button class="period-btn" data-months="12"  onclick="setQuickPeriod(12)">近一年</button>
    <button class="period-btn active" data-months="6"   onclick="setQuickPeriod(6)">近半年</button>
    <button class="period-btn" data-months="3"   onclick="setQuickPeriod(3)">近一季</button>
    <button class="period-btn" data-months="1"   onclick="setQuickPeriod(1)">近一月</button>
    <div class="controls-sep"></div>
    <label style="font-size:12px;color:var(--muted);">开始</label>
    <input type="date" id="start-date" class="date-input" onchange="clearPeriodActive()" />
    <label style="font-size:12px;color:var(--muted);">结束</label>
    <input type="date" id="end-date" class="date-input" onchange="clearPeriodActive()" />
    <button class="btn btn-primary" onclick="runAllBacktests()">运行回测</button>
  </div>

  <div class="indices-grid" id="indices-grid"></div>

  <div class="section-card">
    <div class="section-header">
      <div class="section-title">买卖交易记录</div>
      <select id="trade-strategy-select" class="ctrl-select" onchange="renderTradeHistory()"></select>
    </div>
    <div style="overflow-x:auto;">
      <table>
        <thead>
          <tr>
            <th>日期</th><th>动作</th><th>ETF代码</th><th>成交价</th><th>数量</th><th>成交金额</th><th>手续费</th><th>持仓总额</th><th>单笔盈亏</th><th>收益率</th><th>策略净值</th>
          </tr>
        </thead>
        <tbody id="trade-history-body"><tr><td colspan="11" style="color:var(--muted);text-align:center;">数据加载中...</td></tr></tbody>
      </table>
    </div>
  </div>

</div>

<script src="/static/js/data_update_flow.js"></script>
<script>
  const COLORS = ['#e83938', '#d63031'];

  let strategyList = [];
  let allData = {};
  let paramConfigsByStrategy = {};
  let timingInfo = null;
  let _loadingTimer = null;
  let _loadStartTime = 0;
  const charts = {};

  function fmtDelta(v, d=2) {
    if (v == null || v === '' || Number.isNaN(Number(v))) return '—';
    const n = Number(v);
    return `${n>0?'+':''}${n.toFixed(d)}`;
  }

  function showLoading(msg, pct) {
    const el = document.getElementById('loading');
    if (el) el.classList.remove('hidden');
    if (msg) { const s = document.getElementById('loading-status'); if (s) s.textContent = msg; }
    if (pct != null) { const b = document.getElementById('loading-progress-bar'); if (b) b.style.width = Math.min(100, pct) + '%'; }
    if (!_loadingTimer) {
      _loadStartTime = performance.now();
      _loadingTimer = setInterval(() => {
        const t = document.getElementById('loading-time'); if (!t) return;
        const s = (performance.now() - _loadStartTime) / 1000;
        t.textContent = s >= 60 ? `${Math.floor(s/60)}分${Math.floor(s%60)}秒` : `${s.toFixed(1)}秒`;
      }, 200);
    }
  }
  function hideLoading() {
    const el = document.getElementById('loading');
    if (el) el.classList.add('hidden');
    if (_loadingTimer) { clearInterval(_loadingTimer); _loadingTimer = null; }
  }

  function setQuickPeriod(months) {
    document.querySelectorAll('.period-btn').forEach(b => b.classList.toggle('active', b.dataset.months == months));
    if (months === 'all') {
      document.getElementById('start-date').value = '';
      document.getElementById('end-date').value = '';
    } else {
      const anchor = timingInfo?.data_max_date ? new Date(timingInfo.data_max_date) : new Date();
      anchor.setMonth(anchor.getMonth() - Number(months));
      document.getElementById('start-date').value = anchor.toISOString().split('T')[0];
      document.getElementById('end-date').value = '';
    }
    runAllBacktests();
  }
  function clearPeriodActive() {
    document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  }

  function badgeHTML(action, position) {
    if (action === 'buy')  return ['badge-buy', '▲ 买入'];
    if (action === 'sell') return ['badge-sell', '▼ 卖出'];
    if (Number(position) === 1) return ['badge-hold', '● 持有'];
    return ['badge-flat', '○ 空仓'];
  }

  function valClass(v, eps=1e-9) {
    if (v == null || Number.isNaN(Number(v))) return 'val-neu';
    return Number(v) > eps ? 'val-pos' : (Number(v) < -eps ? 'val-neg' : 'val-neu');
  }

  // Parse metric value: could be string like "-3.69%" or number like 0.5981
  function parseMetricVal(v) {
    if (v == null || v === '' || v === 'N/A') return NaN;
    if (typeof v === 'number') return v;
    const s = String(v).replace('%','').replace('+','').replace('¥','').replace(/,/g,'');
    return parseFloat(s);
  }
  function formatPctVal(v) {
    const n = parseMetricVal(v);
    if (isNaN(n)) return '—';
    return (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
  }
  function formatNumVal(v, d=2) {
    const n = parseMetricVal(v);
    return isNaN(n) ? '—' : n.toFixed(d);
  }
  function formatCurrencyVal(v) {
    const n = parseMetricVal(v);
    if (isNaN(n)) return '—';
    return '¥' + Number(n).toLocaleString('zh-CN', {minimumFractionDigits:2, maximumFractionDigits:2});
  }

  /* ── Data loading ── */
  async function fetchInfo() {
    const resp = await fetch('/api/hk_timing/info');
    timingInfo = await resp.json();
    if (timingInfo.error) throw new Error(timingInfo.error);
    document.getElementById('data-date-badge').textContent = `数据: ${timingInfo.data_min_date} ~ ${timingInfo.data_max_date}`;
    document.querySelector('.subtitle').innerHTML =
      `恒生ETF(159920) · 恒生科技ETF(513180) · ${timingInfo.data_min_date} ~ ${timingInfo.data_max_date} · 趋势+突破+MACD · QDII T+0`;
  }

  async function fetchStrategyList() {
    const resp = await fetch('/api/hk_timing/strategy_list');
    strategyList = await resp.json();
    const sel = document.getElementById('trade-strategy-select');
    sel.innerHTML = strategyList.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
  }

  async function fetchBacktest(sid, start, end) {
    const params = new URLSearchParams({ strategy: sid, profile: 'best' });
    if (start) params.set('start', start);
    if (end) params.set('end', end);
    const resp = await fetch('/api/hk_timing/backtest?' + params.toString());
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    allData[sid] = data;
  }

  async function runAllBacktests() {
    showLoading('正在加载回测...', 30);
    try {
      const start = document.getElementById('start-date').value || undefined;
      const end = document.getElementById('end-date').value || undefined;
      for (const s of strategyList) {
        showLoading(`加载 ${s.name}...`, 50);
        await fetchBacktest(s.id, start, end);
      }
      showLoading('正在渲染...', 85);
      renderAll();
      hideLoading();
    } catch(e) {
      hideLoading();
      document.getElementById('error-banner').classList.remove('hidden');
      document.getElementById('error-banner').textContent = '加载失败: ' + e.message;
    }
  }

  function buildIndexCard(sid, data, meta) {
    const m = data.metrics || {};
    const sig = data.current_signal || {};
    const [badgeCls, badgeText] = badgeHTML(sig.current_action || sig.signal_action, sig.current_position);
    const expPct = sig.target_exposure != null ? (sig.target_exposure * 100).toFixed(0) + '%' : '—';

    const formulas = meta.formula_blocks || [];
    const params = meta.parameters || [];
    const shared = meta.shared_parameters || [];

    const trades = data.trades || [];
    const filterTrades = trades.filter(t => t.action === 'buy' || t.action === 'sell');

    return `
    <div class="index-card" id="card-${sid}">
      <div class="card-header">
        <div class="card-title-row">
          <div>
            <div class="card-title">${meta.name}</div>
            <div class="card-desc">${meta.description || ''}</div>
          </div>
        </div>
      </div>

      <div class="signal-bar">
        <div class="signal-main">
          <span class="signal-label">当前信号</span>
          <span class="signal-badge ${badgeCls}">${badgeText}</span>
        </div>
        <div class="signal-actions">
          <span class="signal-label">目标仓位 ${expPct}</span>
        </div>
      </div>

      <div class="metrics-strip">
        <div class="metric-cell"><div class="lbl">累积净值</div><div class="val ${valClass(parseMetricVal(m.cumulative_return)-1)}">${formatNumVal(m.cumulative_return, 4)}</div></div>
        <div class="metric-cell"><div class="lbl">年化收益</div><div class="val ${valClass(parseMetricVal(m.annual_return))}">${m.annual_return || '—'}</div></div>
        <div class="metric-cell"><div class="lbl">最大回撤</div><div class="val val-neg">${m.max_drawdown || '—'}</div></div>
        <div class="metric-cell"><div class="lbl">Calmar比率</div><div class="val ${valClass(parseMetricVal(m.calmar_ratio))}">${formatNumVal(m.calmar_ratio)}</div></div>
        <div class="metric-cell"><div class="lbl">累计收益</div><div class="val ${valClass(parseMetricVal(m.total_return_pct))}">${m.total_return_pct || '—'}</div></div>
        <div class="metric-cell"><div class="lbl">信号日期</div><div class="val" style="font-size:12px;">${sig.as_of_date || '—'}</div></div>
      </div>

      <div class="position-strip">
        <div class="position-item"><div class="lbl">ETF代码</div><div class="val" style="font-size:13px;">${sig.etf_code || '—'} ${sig.etf_name || ''}</div></div>
        <div class="position-item"><div class="lbl">最近交易</div><div class="val" style="font-size:13px;">${filterTrades.length ? filterTrades[filterTrades.length-1].date + ' ' + (filterTrades[filterTrades.length-1].action==='buy'?'买入':'卖出') : '无'}</div></div>
        <div class="position-item"><div class="lbl">总交易次数</div><div class="val" style="font-size:13px;">${m.rebalance_count || filterTrades.length} 次</div></div>
        <div class="position-item"><div class="lbl">平均仓位</div><div class="val" style="font-size:13px;">${m.avg_exposure != null ? (m.avg_exposure*100).toFixed(1)+'%' : '—'}</div></div>
      </div>

      <div class="chart-col-wrap"><div class="col-chart-inner" id="chart-${sid}"></div></div>

      <div class="card-footer">
        <strong>当前信号原因：</strong>${sig.current_reason || sig.reason_summary || '—'}
      </div>

      <div class="formula-section">
        <div class="formula-title">📐 策略原理</div>
        <div class="formula-summary">${meta.principle_summary || ''}</div>
        ${formulas.map(f => `
          <div class="formula-block">
            <div class="formula-block-title">${f.title}</div>
            <div class="formula-expr">${f.expression}</div>
            ${f.explanation ? `<div class="formula-note">${f.explanation}</div>` : ''}
          </div>
        `).join('')}
      </div>

      <div class="param-section">
        <div class="param-header"><div class="param-title">⚙ 策略参数</div></div>
        <div class="factor-grid">
          ${[...params, ...shared].map(p => {
            const val = p.default != null ? p.default : '';
            return `
            <div class="factor-item">
              <div class="factor-name">${p.label}${p.unit ? ' ('+p.unit+')' : ''}</div>
              <div class="factor-desc">${p.description || ''}</div>
              <div class="slider-row">
                <input type="range" min="${p.min != null ? p.min : 0}" max="${p.max != null ? p.max : 100}" step="${p.step || 1}" value="${val}" data-key="${p.key}" data-strategy="${sid}" oninput="this.nextElementSibling.textContent=this.value" />
                <span class="slider-val">${val}</span>
              </div>
            </div>`;
          }).join('')}
        </div>
        <div style="margin-top:12px;text-align:right;">
          <button class="btn btn-primary" onclick="applyParams('${sid}')">应用并重跑</button>
        </div>
      </div>
    </div>`;
  }

  function initChart(sid) {
    const dom = document.getElementById('chart-' + sid);
    if (!dom) return;
    if (charts[sid]) charts[sid].dispose();
    const chart = echarts.init(dom);
    charts[sid] = chart;

    const data = allData[sid];
    if (!data) return;

    const curve = data.equity_curve || [];
    const dates = curve.map(d => d.date);
    const navs = curve.map(d => d.value);

    const trainEnd = data.training_cutoff || '2025-11-30';

    chart.setOption({
      tooltip: { trigger: 'axis' },
      grid: { left: 55, right: 15, top: 15, bottom: 28 },
      xAxis: { type: 'category', data: dates, axisLabel: { color: '#888', fontSize: 10, formatter: v => v ? v.slice(0,7) : '' }, axisLine: { lineStyle: { color: '#ddd' } } },
      yAxis: { type: 'value', axisLabel: { color: '#888', fontSize: 10, formatter: v => v.toFixed(2) }, splitLine: { lineStyle: { color: '#eee' } } },
      series: [{
        type: 'line', data: navs, smooth: false, symbol: 'none',
        lineStyle: { color: '#e83938', width: 2 },
        areaStyle: { color: 'rgba(232,57,56,0.06)' },
        markLine: {
          silent: true, symbol: 'none',
          lineStyle: { color: '#f59e0b', type: 'dashed', width: 1 },
          data: [{ xAxis: trainEnd, label: { formatter: '训练截止', color: '#f59e0b', fontSize: 10 } }]
        }
      }]
    });
  }

  function renderAll() {
    const grid = document.getElementById('indices-grid');
    grid.innerHTML = '';
    for (const s of strategyList) {
      const data = allData[s.id];
      const meta = strategyList.find(x => x.id === s.id) || s;
      if (!data) continue;
      grid.innerHTML += buildIndexCard(s.id, data, meta);
    }
    setTimeout(() => {
      for (const s of strategyList) {
        if (allData[s.id]) initChart(s.id);
      }
      renderTradeHistory();
    }, 100);
  }

  function renderTradeHistory() {
    const sel = document.getElementById('trade-strategy-select');
    const sid = sel.value;
    const data = allData[sid];
    const tbody = document.getElementById('trade-history-body');
    const etfCode = (data?.current_signal?.etf_code) || '—';
    if (!data || !data.trades) {
      tbody.innerHTML = '<tr><td colspan="11" style="color:var(--muted);text-align:center;">暂无交易数据</td></tr>';
      return;
    }
    const trades = data.trades.filter(t => t.action === 'buy' || t.action === 'sell');
    if (!trades.length) {
      tbody.innerHTML = '<tr><td colspan="11" style="color:var(--muted);text-align:center;">暂无交易记录</td></tr>';
      return;
    }
    tbody.innerHTML = trades.map((t, i) => {
      const action = t.action === 'buy' ? '买入' : '卖出';
      const cls = t.action === 'buy' ? 'action-buy' : 'action-sell';
      const prevClose = i > 0 ? trades[i-1].close : null;
      const pnl = prevClose && t.action === 'sell' ? ((t.close - prevClose) / prevClose * 100) : null;
      return `
      <tr>
        <td>${t.date || '—'}</td>
        <td class="${cls}">${action}</td>
        <td>${etfCode}</td>
        <td>${t.close != null ? Number(t.close).toFixed(3) : '—'}</td>
        <td>—</td>
        <td>—</td>
        <td>—</td>
        <td>—</td>
        <td style="color:${(pnl||0)>=0?'var(--red)':'var(--green)'};font-weight:700;">${pnl != null ? (pnl>=0?'+':'')+pnl.toFixed(2)+'%' : '—'}</td>
        <td style="color:${(pnl||0)>=0?'var(--red)':'var(--green)'};">${pnl != null ? (pnl>=0?'+':'')+pnl.toFixed(2)+'%' : '—'}</td>
        <td>${t.strength_score != null ? Number(t.strength_score).toFixed(4) : '—'}</td>
      </tr>`;
    }).join('');
  }

  async function applyParams(sid) {
    showLoading('重新计算...', 50);
    try {
      const inputs = document.querySelectorAll(`input[data-strategy="${sid}"]`);
      const extraParams = {};
      inputs.forEach(inp => { extraParams[inp.dataset.key] = inp.value; });
      const start = document.getElementById('start-date').value || undefined;
      const end = document.getElementById('end-date').value || undefined;
      const params = new URLSearchParams({ strategy: sid, profile: 'best', ...extraParams });
      if (start) params.set('start', start);
      if (end) params.set('end', end);
      const resp = await fetch('/api/hk_timing/backtest?' + params.toString());
      const data = await resp.json();
      if (data.error) throw new Error(data.error);
      allData[sid] = data;
      renderAll();
      hideLoading();
    } catch(e) {
      hideLoading();
      alert('重跑失败: ' + e.message);
    }
  }

  async function init() {
    showLoading('正在连接服务器...', 5);
    try {
      await fetchInfo();
      showLoading('加载策略列表...', 60);
      await fetchStrategyList();
      showLoading('加载回测数据...', 75);
      await runAllBacktests();
      hideLoading();
    } catch(e) {
      hideLoading();
      document.getElementById('error-banner').classList.remove('hidden');
      document.getElementById('error-banner').textContent = '初始化失败: ' + e.message;
    }
  }

  async function updateIndexData() {
    const btn = document.getElementById('btn-update-index');
    const msg = document.getElementById('index-update-msg');
    if (!window.DataUpdateFlow) { msg.textContent = '更新模块未加载，请刷新页面'; return; }
    btn.disabled = true; btn.textContent = '拉取中...'; msg.textContent = '检查数据是否需要更新...';
    try {
      const r = await window.DataUpdateFlow.run({ type: 'index',
        onReload: async () => { msg.textContent = '数据刷新完成，重新加载...'; location.reload(); }
      });
      if (r.aborted && r.reason === 'no_update_needed') { msg.textContent = '数据已最新'; }
      else if (r.aborted) { msg.style.color = 'var(--red)'; msg.textContent = r.detail || '更新中止'; }
      else { msg.textContent = '刷新完成'; }
    } finally { btn.disabled = false; btn.textContent = '↻ 刷新数据'; }
  }

  document.addEventListener('DOMContentLoaded', init);
  window.addEventListener('resize', () => Object.values(charts).forEach(c => c.resize()));
</script>
</body>
</html>
